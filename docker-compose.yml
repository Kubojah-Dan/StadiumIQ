version: "3.8"

services:
  db:
    image: timescale/timescaledb:latest-pg14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stadiumiq
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stadiumiq_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: stadiumiq
      RABBITMQ_DEFAULT_PASS: password

volumes:
  pgdata:
