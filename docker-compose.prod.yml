# docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────
# LOCAL PRODUCTION SIMULATION
# Use this to test the production build locally before deploying
# to Cloud Run. In actual GCP deployment, stateful services
# (Cloud SQL + Memorystore) replace db/redis containers.
# ─────────────────────────────────────────────────────────────────
version: '3.8'

services:
  # ── Stateful backing services (local simulation only) ──────────
  db:
    image: timescale/timescaledb:latest-pg14
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stadiumiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-stadiumiq_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - stadium_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stadiumiq} -d ${POSTGRES_DB:-stadiumiq_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - stadium_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ───────────────────────────────────────
  core-api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-stadiumiq}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-stadiumiq_prod}
      - REDIS_URL=redis://redis:6379
      - ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - stadium_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-stadiumiq}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-stadiumiq_prod}
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - stadium_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - REDIS_URL=redis://redis:6379
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stadium_net
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # In Cloud Run: these point to the actual *.run.app service URLs
      # Locally: point to the local containers
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_REALTIME_WS_URL=${NEXT_PUBLIC_REALTIME_WS_URL:-ws://localhost:8001}
      - NEXT_PUBLIC_GOOGLE_MAPS_EMBED_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_EMBED_API_KEY:-}
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-}
      - GOOGLE_GEMINI_MODEL=${GOOGLE_GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      - realtime
      - core-api
    networks:
      - stadium_net

volumes:
  pgdata:

networks:
  stadium_net:
    driver: bridge
