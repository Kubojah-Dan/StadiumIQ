version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stadiumiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-stadiumiq_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - stadium_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stadiumiq} -d ${POSTGRES_DB:-stadiumiq_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - stadium_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stadium_net
    deploy:
      resources:
        limits:
          memory: 1G

  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgresql://${POSTGRES_USER:-stadiumiq}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-stadiumiq_prod}
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - stadium_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_REALTIME_WS=wss://api.stadiumiq.demo/ws/dashboard
      - NEXT_PUBLIC_API_URL=https://api.stadiumiq.demo
    depends_on:
      - realtime
    networks:
      - stadium_net

volumes:
  pgdata:

networks:
  stadium_net:
    driver: bridge
